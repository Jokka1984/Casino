<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<style>
    body {
        background-color: #1d1934;
        font-family: "Segoe UI", Arial, sans-serif;
        margin: 0;
        padding: 0;
        text-align: center;
        transition: background 0.3s;
    }

    /* Fullscreen mode */
    body.fullscreen {
        background: radial-gradient(circle at center, #2a2550 0%, #0d0b1f 100%);
    }

    #logo {
        display: block;
        margin: 20px auto 10px auto;
        max-width: 140px;
    }

    h1 {
        font-size: clamp(1.2rem, 4vw, 2.5rem);
        color: #e12826;
        margin: 5px;
    }

    #display {
        font-size: clamp(3rem, 12vw, 8rem);
        color: #fece02;
        margin: 40px 10px;
        transition: all 0.2s ease;
        word-break: break-word;
    }

    /* Glow effect during animation */
    .spinning {
        color: #e12826 !important;
        text-shadow: 0 0 10px #e12826, 0 0 20px #e12826;
    }

    /* Winner effect */
    .winner {
        color: #fece02 !important;
        text-shadow: 0 0 15px #fece02, 0 0 30px #fece02;
    }

    button {
        margin: 10px;
        font-size: 1.2rem;
        padding: 12px 20px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
    }

    #start {
        background: #e12826;
        color: white;
    }

    #fullscreenBtn {
        background: #343145;
        color: #fece02;
    }

    /* Hide controls in fullscreen for cleaner look */
    body.fullscreen button {
        opacity: 0.2;
    }

    body.fullscreen button:hover {
        opacity: 1;
    }
</style>

```
<img id="logo" src="logo.png" alt="Club Logo">
<h1>Weekly Members Draw</h1>
<h1>Jackpot $250</h1>

<div id="display">Loading...</div>

<button id="start" disabled>Start Members Draw</button>
<button id="fullscreenBtn">Enter Fullscreen</button>

<script>
    let participants = [];

    const display = document.getElementById('display');
    const startBtn = document.getElementById('start');
    const fullscreenBtn = document.getElementById('fullscreenBtn');

    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQhbyJ2fksThS4Hv7c2f0ckZ0L2L7GyXjvYJ7DqKKEjeUl7ES7TSXWw9y-VyhMIpIRvCsCCfL9QD1fV/pub?gid=1606765783&single=true&output=csv";

    async function loadParticipants() {
        try {
            const response = await fetch(CSV_URL);
            const csvText = await response.text();

            const results = Papa.parse(csvText, {
                header: true,
                skipEmptyLines: true
            });

            participants = results.data.filter(row => row.Number && row.Name);

            if (participants.length > 0) {
                startBtn.disabled = false;
                display.textContent = "?";
            } else {
                display.textContent = "No valid data!";
            }

        } catch (error) {
            console.error(error);
            display.textContent = "Error loading data";
        }
    }

    loadParticipants();

    let intervalId = null;

    function shuffleAnimation() {
        let count = 0;
        const maxCycles = 100;

        display.classList.add("spinning");

        intervalId = setInterval(() => {
            const randomEntry = participants[Math.floor(Math.random() * participants.length)];
            display.textContent = `${randomEntry.Number} - ${randomEntry.Name}`;

            count++;

            if (count >= maxCycles) {
                clearInterval(intervalId);

                display.classList.remove("spinning");

                const winner = participants[Math.floor(Math.random() * participants.length)];
                display.textContent = `🎉 ${winner.Number} - ${winner.Name} 🎉`;

                display.classList.add("winner");

                startBtn.disabled = false;
            }

        }, 50);
    }

    startBtn.addEventListener('click', () => {
        startBtn.disabled = true;
        display.classList.remove("winner");
        shuffleAnimation();
    });

    // Fullscreen toggle
    fullscreenBtn.addEventListener('click', () => {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
            document.body.classList.add("fullscreen");
            fullscreenBtn.textContent = "Exit Fullscreen";
        } else {
            document.exitFullscreen();
            document.body.classList.remove("fullscreen");
            fullscreenBtn.textContent = "Enter Fullscreen";
        }
    });
</script>
```
